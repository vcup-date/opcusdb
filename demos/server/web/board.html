<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>opcusdb Co-Board · CRDT whiteboard</title>
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      html, body { margin: 0; height: 100%; overflow: hidden; background: #0b0e16; color: #e7ecf6;
        font: 14px/1.4 ui-monospace, SFMono-Regular, Menlo, monospace; user-select: none; }
      .accent { color: #7dcfff; }
      #bar { position: fixed; top: 0; left: 0; right: 0; height: 52px; display: flex; align-items: center; gap: 12px;
        padding: 0 14px; background: #0e1422; border-bottom: 1px solid #1d2740; z-index: 5; }
      #bar h1 { font-size: 16px; margin: 0; font-weight: 800; }
      #bar .sp { flex: 1; }
      #bar label { color: #9fb0d0; font-size: 12px; }
      #bar input[type=color] { width: 34px; height: 28px; border: 1px solid #2a3550; border-radius: 6px; background: #121a2c; padding: 0; }
      #bar input[type=range] { width: 110px; vertical-align: middle; }
      .btn { font: inherit; font-weight: 700; padding: 7px 12px; border: 1px solid #2a3550; border-radius: 8px; background: #14203a; color: #cfe0ff; cursor: pointer; }
      .btn.on { background: #f7a23b; color: #1a1206; border-color: #f7a23b; }
      .btn.off { background: #ff5d5d; color: #2a0a0a; border-color: #ff5d5d; }
      #users { display: flex; gap: 8px; align-items: center; }
      .u { display: flex; align-items: center; gap: 5px; font-size: 12px; }
      .u .dot { width: 10px; height: 10px; border-radius: 50%; }
      #board { position: fixed; top: 52px; left: 0; right: 0; bottom: 0; cursor: crosshair; background:
        repeating-linear-gradient(0deg,#0e1320 0 1px,transparent 1px 28px),
        repeating-linear-gradient(90deg,#0e1320 0 1px,transparent 1px 28px), #0b0f1a; }
      #cursors { position: fixed; inset: 52px 0 0 0; z-index: 4; pointer-events: none; }
      .cur { position: absolute; transform: translate(-2px,-2px); font-size: 12px; white-space: nowrap; }
      .cur b { display: inline-block; width: 10px; height: 10px; border-radius: 50%; box-shadow: 0 0 0 2px #0008; }
      .cur span { background: #000a; padding: 1px 5px; border-radius: 5px; margin-left: 4px; }
      #offbanner { position: fixed; top: 60px; left: 50%; transform: translateX(-50%); z-index: 6; display: none;
        background: #ff5d5d; color: #2a0a0a; font-weight: 800; padding: 6px 16px; border-radius: 10px; box-shadow: 0 6px 20px #0008; }
      #join { position: fixed; inset: 0; z-index: 10; display: flex; align-items: center; justify-content: center; background: #06080f e6; }
      .panel { text-align: center; background: #0e1422; border: 1px solid #233; border-radius: 16px; padding: 28px 32px; width: 380px; }
      .panel h1 { margin: 0 0 4px; font-size: 26px; } .panel p { color: #9fb0d0; }
      .panel input[type=text] { width: 100%; font: inherit; text-align: center; padding: 10px; margin: 12px 0 6px; border-radius: 10px; border: 1px solid #2a3550; background: #121a2c; color: #e6edff; }
      .panel button { width: 100%; font: inherit; font-weight: 800; padding: 12px; border: 0; border-radius: 12px; cursor: pointer; background: linear-gradient(180deg,#3a86ff,#2f6feb); color: #fff; }
    </style>
  </head>
  <body>
    <div id="bar">
      <h1><span class="accent">opcusdb</span> Co-Board</h1>
      <label>color <input type="color" id="color" value="#ff5d5d" /></label>
      <label>size <input type="range" id="size" min="1" max="20" value="4" /></label>
      <button class="btn" id="eraser">erase</button>
      <button class="btn" id="clear">clear</button>
      <button class="btn off" id="offline">go offline</button>
      <div class="sp"></div>
      <div id="users"></div>
    </div>
    <canvas id="board"></canvas>
    <div id="cursors"></div>
    <div id="offbanner">⚠ OFFLINE — your edits will sync &amp; merge on reconnect (CRDT)</div>

    <div id="join"><div class="panel">
      <h1><span class="accent">opcusdb</span> Co-Board</h1>
      <p>A shared whiteboard whose document is a CRDT (`OrSet`). Draw together — and your work merges even after drawing offline.</p>
      <input type="text" id="nick" placeholder="your name" maxlength="14" />
      <button id="go">start drawing ▶</button>
      <p style="color:#6b7a99;font-size:12px">open more tabs to collaborate · try "go offline", draw, then come back</p>
    </div></div>

    <script src="/board.js"></script>
  </body>
</html>
